<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ፕራይም ሞባይል | Prime Mobile</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --surface: #ffffff;
      --background: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--background);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    html {
      scroll-behavior: smooth;
    }

    /* Navbar (Glassmorphism) */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding: 16px 20px;
      box-shadow: var(--shadow-sm);
    }

    .navbar-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo i {
      color: var(--primary);
    }

    .search-container {
      position: relative;
      flex: 1;
      max-width: 400px;
    }

    .search-container i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 0.95rem;
      transition: var(--transition);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
      flex: 1;
      width: 100%;
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: var(--radius-xl);
      padding: 48px 32px;
      color: white;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      line-height: 1.2;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.1rem;
      color: #cbd5e1;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Category Chips */
    .categories {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 24px;
      scrollbar-width: none;
    }
    
    .categories::-webkit-scrollbar {
      display: none;
    }

    .chip {
      padding: 10px 20px;
      border-radius: 99px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-weight: 500;
      font-size: 0.9rem;
      white-space: nowrap;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
    }

    .chip:hover {
      border-color: var(--primary);
      background: #f0fdf4; /* Subtle hint on hover */
    }

    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    /* Products Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    /* Product Card */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(0,0,0,0.02);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .card-img-wrapper {
      width: 100%;
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      background: #f1f5f9;
      margin-bottom: 16px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.5s ease;
      padding: 12px;
    }

    .card:hover .card-img-wrapper img {
      transform: scale(1.05);
    }

    .fallback-icon {
      color: var(--text-muted);
      opacity: 0.5;
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .card-price span {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .btn-view {
      background: var(--background);
      color: var(--text-main);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .card:hover .btn-view {
      background: var(--primary);
      color: white;
    }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      height: 380px;
      border-radius: var(--radius-lg);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-content {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox-img-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius-md);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
    }

    .lightbox-controls {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 16px;
      z-index: 101;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .icon-btn:hover {
      background: white;
      color: var(--text-main);
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      z-index: 101;
    }

    .nav-btn:hover {
      background: white;
      color: var(--text-main);
    }

    .nav-btn.prev { left: 20px; }
    .nav-btn.next { right: 20px; }

    .lightbox-info {
      background: white;
      width: 100%;
      padding: 24px;
      border-radius: var(--radius-lg);
      margin-top: 20px;
      text-align: center;
    }

    .lightbox-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .lightbox-desc {
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .lightbox-price {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* Status Banner */
    .status-banner {
      background: #fee2e2;
      color: #991b1b;
      text-align: center;
      padding: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      display: none;
    }

    .status-banner.show {
      display: block;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        padding: 32px 20px;
      }
      .hero h1 {
        font-size: 2rem;
      }
      .nav-btn {
        display: none; /* Rely on swipe for mobile */
      }
    }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
    }
    
    .empty-state i {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- Store Status Banner -->
  <div id="statusBanner" class="status-banner">
    <i data-lucide="info" style="width:16px; height:16px; display:inline-block; vertical-align:middle; margin-right:4px;"></i>
    ሱቁ በአሁኑ ሰዓት ዝግ ነው። (Store is currently closed)
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="#" class="logo">
        <i data-lucide="smartphone"></i>
        <span>ፕራይም ሞባይል</span>
      </a>
      <div class="search-container">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="ስልክ ወይም መለዋወጫ ይፈልጉ...">
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    
    <!-- Hero Section -->
    <section class="hero">
      <h1>የእርስዎን ምርጥ ስልክ ያግኙ</h1>
      <p>ኦሪጅናል ስማርትፎኖች፣ ታብሌቶች እና መለዋወጫዎች በተመጣጣኝ ዋጋ። ጥራት ያለው አገልግሎት ከእኛ ጋር።</p>
    </section>

    <!-- Categories -->
    <div class="categories" id="categoryTabs">
      <button class="chip active" data-category="All">
        <i data-lucide="layout-grid" style="width: 16px; height: 16px;"></i> ሁሉም (All)
      </button>
      <button class="chip" data-category="Phone">
        <i data-lucide="smartphone" style="width: 16px; height: 16px;"></i> ስልኮች (Phones)
      </button>
      <button class="chip" data-category="Tablet">
        <i data-lucide="tablet" style="width: 16px; height: 16px;"></i> ታብሌቶች (Tablets)
      </button>
      <button class="chip" data-category="Accessory">
        <i data-lucide="headphones" style="width: 16px; height: 16px;"></i> መለዋወጫዎች (Accessories)
      </button>
    </div>

    <!-- Products Grid -->
    <div class="grid" id="productList">
      <!-- Skeletons will load here initially -->
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; <span id="year"></span> ፕራይም ሞባይል (Prime Mobile). መብቱ በህግ የተጠበቀ ነው።</p>
  </footer>

  <!-- Lightbox Overlay -->
  <div id="lightbox" class="lightbox">
    <div class="lightbox-controls">
      <button class="icon-btn close-btn" onclick="closeLightbox()">
        <i data-lucide="x"></i>
      </button>
    </div>
    
    <button class="nav-btn prev" onclick="prevImage(event)">
      <i data-lucide="chevron-left"></i>
    </button>
    <button class="nav-btn next" onclick="nextImage(event)">
      <i data-lucide="chevron-right"></i>
    </button>

    <div class="lightbox-content">
      <div class="lightbox-img-container">
        <img id="lbImage" src="" alt="Product Image">
      </div>
      <div class="lightbox-info">
        <h3 id="lbTitle" class="lightbox-title"></h3>
        <p id="lbDesc" class="lightbox-desc"></p>
        <div id="lbPrice" class="lightbox-price"></div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Icons
    lucide.createIcons();
    document.getElementById('year').textContent = new Date().getFullYear();

    // State Variables
    let allProducts = [];
    let currentCategory = 'All';
    let currentSearch = '';
    
    // Lightbox State
    let lbImages = [];
    let lbCurrentIndex = 0;

    const productListEl = document.getElementById('productList');
    const searchInput = document.getElementById('searchInput');
    const categoryChips = document.querySelectorAll('.chip');

    // Number formatter for Ethiopian Birr
    const formatPrice = (price) => {
      return new Intl.NumberFormat('en-ET').format(price);
    };

    // Render skeleton loaders
    function renderSkeletons() {
      productListEl.innerHTML = Array(8).fill('').map(() => `
        <div class="card skeleton-card skeleton"></div>
      `).join('');
    }

    // Initialize App
    async function init() {
      renderSkeletons();
      await checkSettings();
      await fetchProducts();
    }

    // Check store status
    async function checkSettings() {
      try {
        const res = await fetch('/api/settings');
        if (res.ok) {
          const settings = await res.json();
          if (settings.isOpen === false) {
            document.getElementById('statusBanner').classList.add('show');
          }
        }
      } catch (err) {
        console.error('Settings fetch error:', err);
      }
    }

    // Fetch Products
    async function fetchProducts() {
      try {
        const res = await fetch('/api/products');
        if (!res.ok) throw new Error('Failed to load products');
        allProducts = await res.json();
        
        // Sort newest first
        allProducts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        filterAndRender();
      } catch (err) {
        console.error(err);
        productListEl.innerHTML = `
          <div class="empty-state">
            <i data-lucide="alert-circle"></i>
            <h3>ምርቶችን መጫን አልተቻለም (Failed to load)</h3>
            <p>እባክዎ ገፁን እንደገና ያድሱ (Please refresh the page)</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // Filter and Render
    function filterAndRender() {
      const query = currentSearch.toLowerCase();
      const filtered = allProducts.filter(p => {
        const matchesCategory = currentCategory === 'All' || p.category === currentCategory;
        const matchesSearch = p.name.toLowerCase().includes(query) || p.description.toLowerCase().includes(query);
        return matchesCategory && matchesSearch;
      });

      if (filtered.length === 0) {
        productListEl.innerHTML = `
          <div class="empty-state">
            <i data-lucide="search-x"></i>
            <h3>ምንም ምርት አልተገኘም</h3>
            <p>በዚህ ፍለጋ የተገኘ ውጤት የለም።</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      productListEl.innerHTML = filtered.map(product => {
        // Fallback image logic
        let displayImg = '';
        if (product.images && product.images.length > 0) {
          displayImg = `<img src="${product.images[0]}" alt="${escapeHtml(product.name)}" loading="lazy">`;
        } else if (product.imageUrl) {
          displayImg = `<img src="${product.imageUrl}" alt="${escapeHtml(product.name)}" loading="lazy">`;
        } else {
          displayImg = `<i data-lucide="image" class="fallback-icon" style="width: 64px; height: 64px;"></i>`;
        }

        return `
          <div class="card" onclick='openLightbox(${JSON.stringify(product).replace(/'/g, "&#39;")})'>
            <div class="card-img-wrapper">
              ${displayImg}
            </div>
            <div class="card-content">
              <span class="card-category">${product.category || 'Product'}</span>
              <h3 class="card-title">${escapeHtml(product.name)}</h3>
              <p class="card-desc">${escapeHtml(product.description)}</p>
              <div class="card-footer">
                <div class="card-price">${formatPrice(product.price)} <span>ETB</span></div>
                <div class="btn-view">
                  <i data-lucide="arrow-up-right" style="width: 20px; height: 20px;"></i>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons();
    }

    // Helper: Escape HTML to prevent XSS
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Event Listeners for Search & Categories
    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value;
      filterAndRender();
    });

    categoryChips.forEach(chip => {
      chip.addEventListener('click', () => {
        // Update active class
        categoryChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        
        // Update filter
        currentCategory = chip.dataset.category;
        filterAndRender();
      });
    });

    // Lightbox Logic
    const lightboxEl = document.getElementById('lightbox');
    const lbImageEl = document.getElementById('lbImage');
    const lbTitleEl = document.getElementById('lbTitle');
    const lbDescEl = document.getElementById('lbDesc');
    const lbPriceEl = document.getElementById('lbPrice');

    function openLightbox(product) {
      lbImages = product.images && product.images.length > 0 ? product.images : (product.imageUrl ? [product.imageUrl] : []);
      lbCurrentIndex = 0;
      
      lbTitleEl.textContent = product.name;
      lbDescEl.textContent = product.description;
      lbPriceEl.innerHTML = `${formatPrice(product.price)} <span style="font-size:1rem; color:var(--text-muted)">ETB</span>`;

      updateLightboxImage();
      lightboxEl.classList.add('active');
      document.body.style.overflow = 'hidden'; // Prevent background scrolling
    }

    function updateLightboxImage() {
      if (lbImages.length === 0) {
        lbImageEl.style.display = 'none';
        return;
      }
      lbImageEl.style.display = 'block';
      lbImageEl.src = lbImages[lbCurrentIndex];
      
      // Manage Nav Buttons Visibility
      const prevBtn = document.querySelector('.nav-btn.prev');
      const nextBtn = document.querySelector('.nav-btn.next');
      
      if (lbImages.length <= 1) {
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
      } else {
        prevBtn.style.display = 'flex';
        nextBtn.style.display = 'flex';
      }
    }

    function closeLightbox() {
      lightboxEl.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => {
        lbImageEl.src = '';
      }, 300);
    }

    function prevImage(e) {
      if (e) e.stopPropagation();
      if (lbImages.length <= 1) return;
      lbCurrentIndex = (lbCurrentIndex - 1 + lbImages.length) % lbImages.length;
      updateLightboxImage();
    }

    function nextImage(e) {
      if (e) e.stopPropagation();
      if (lbImages.length <= 1) return;
      lbCurrentIndex = (lbCurrentIndex + 1) % lbImages.length;
      updateLightboxImage();
    }

    // Close lightbox when clicking outside
    lightboxEl.addEventListener('click', (e) => {
      if (e.target === lightboxEl) {
        closeLightbox();
      }
    });

    // Swipe Support for Lightbox
    let touchStartX = 0;
    lightboxEl.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });

    lightboxEl.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const diff = touchEndX - touchStartX;
      if (Math.abs(diff) > 50) { // Threshold
        if (diff > 0) prevImage();
        else nextImage();
      }
    }, { passive: true });

    // Keyboard Support
    document.addEventListener('keydown', (e) => {
      if (!lightboxEl.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'Escape') closeLightbox();
    });

    // Start
    init();

  </script>
</body>
</html>
