<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ፕራይም ሞባይል | ምርጥ ስልኮች እና መለዋወጫዎች</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #f8fafd 0%, #eef2f8 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      padding-bottom: 48px;
      min-height: 100vh;
    }

    /* smooth scroll */
    html {
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    /* Hero Section – Premium Redesign, Mobile-first */
    .hero {
      background: linear-gradient(135deg, #0B2B5E 0%, #1A4A8B 50%, #2C6EAF 100%);
      border-radius: 32px;
      padding: 24px 20px;
      margin-bottom: 24px;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 16px 28px -10px rgba(0, 0, 0, 0.2);
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -30%;
      right: -20%;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero::after {
      content: "📱";
      position: absolute;
      bottom: -10px;
      right: 10px;
      font-size: 80px;
      opacity: 0.08;
      pointer-events: none;
    }

    .hero h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hero p {
      font-size: 0.9rem;
      opacity: 0.92;
      line-height: 1.4;
      max-width: 80%;
    }

    .open-status {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    .open-status.open {
      background: #0F9D58;
      box-shadow: 0 4px 12px rgba(15,157,88,0.3);
    }

    .open-status.closed {
      background: #DC3545;
      box-shadow: 0 4px 12px rgba(220,53,69,0.3);
    }

    /* Filter Card – Glassmorphism, mobile-optimized */
    .filter-bar {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 16px 20px;
      margin-bottom: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .search-input {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #e2edf7;
      border-radius: 60px;
      font-size: 0.95rem;
      background: #ffffff;
      transition: all 0.25s;
      font-family: inherit;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .search-input:focus {
      outline: none;
      border-color: #2C6EAF;
      box-shadow: 0 0 0 3px rgba(44,110,175,0.2);
    }

    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .chip {
      background: #ffffff;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      color: #1E2F4F;
      border: 1px solid #dce5ef;
      backdrop-filter: blur(2px);
      touch-action: manipulation;
    }

    .chip.active {
      background: linear-gradient(105deg, #1A4A8B 0%, #2C6EAF 100%);
      color: white;
      border-color: transparent;
      box-shadow: 0 6px 14px -6px rgba(26,74,139,0.35);
      transform: scale(1.02);
    }

    .chip:active {
      transform: scale(0.96);
    }

    /* Product Grid – Responsive columns for mobile/tablet */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 540px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Product Card – Touch-friendly, cleaner spacing */
    .card {
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.15, 0.75, 0.45, 1);
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      height: 100%;
      border: 1px solid rgba(0,0,0,0.02);
    }

    .card:active {
      transform: scale(0.99);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f0f4fa;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .card-content {
      padding: 18px 16px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      background: #eef3fc;
      padding: 4px 12px;
      border-radius: 60px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #1A4A8B;
      letter-spacing: 0.3px;
      width: fit-content;
      margin-bottom: 12px;
    }

    .product-name {
      font-size: 1.25rem;
      font-weight: 800;
      color: #0C2A4A;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .product-price {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(115deg, #1A4A8B, #2C6EAF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 8px 0 10px;
      letter-spacing: -0.5px;
    }

    .product-desc {
      color: #475569;
      font-size: 0.85rem;
      line-height: 1.45;
      margin: 6px 0 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Premium Call Button – Larger tap target */
    .call-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(105deg, #0F9D58, #0B7E46);
      color: white;
      border: none;
      padding: 14px 16px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      margin-top: 14px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 12px rgba(15,157,88,0.25);
      touch-action: manipulation;
    }

    .call-btn:active {
      transform: scale(0.97);
      background: linear-gradient(105deg, #0B7E46, #0F9D58);
    }

    /* Loader Animation */
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px;
      color: #2C6EAF;
      font-weight: 600;
      gap: 12px;
      background: rgba(255,255,255,0.6);
      border-radius: 48px;
    }

    .loader::after {
      content: "";
      width: 26px;
      height: 26px;
      border: 3px solid #e2e8f0;
      border-top-color: #2C6EAF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Messages */
    .error-msg, .no-results {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 24px 18px;
      text-align: center;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .error-msg {
      color: #B91C1C;
      border-left: 4px solid #DC3545;
    }

    .no-results {
      color: #B45309;
      background: #FFF8E7;
    }

    footer {
      text-align: center;
      margin-top: 48px;
      color: #5A6E85;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 16px 8px;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    /* Lightbox – Premium Overlay, mobile gestures */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      touch-action: pan-y pinch-zoom;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 92%;
      max-height: 75%;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }

    .lightbox .close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 38px;
      font-weight: 300;
      color: white;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }

    .lightbox .close:active {
      background: rgba(255,255,255,0.2);
    }

    .lightbox .prev,
    .lightbox .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 28px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 60px;
      transition: 0.2s;
      font-weight: 300;
    }

    .lightbox .prev:active,
    .lightbox .next:active {
      background: rgba(255,255,255,0.3);
      transform: translateY(-50%) scale(0.95);
    }

    .lightbox .prev {
      left: 12px;
    }

    .lightbox .next {
      right: 12px;
    }

    .lightbox .counter {
      position: absolute;
      bottom: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 6px 18px;
      border-radius: 60px;
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Extra mobile refinements */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      .hero {
        padding: 20px 16px;
        border-radius: 28px;
      }
      .hero h1 {
        font-size: 1.6rem;
      }
      .hero p {
        font-size: 0.8rem;
        max-width: 70%;
      }
      .open-status {
        top: 16px;
        right: 16px;
        padding: 4px 12px;
        font-size: 0.7rem;
      }
      .filter-bar {
        padding: 14px 16px;
        border-radius: 32px;
      }
      .search-input {
        padding: 12px 18px;
        font-size: 0.9rem;
      }
      .chip {
        padding: 6px 16px;
        font-size: 0.8rem;
      }
      .product-name {
        font-size: 1.15rem;
      }
      .product-price {
        font-size: 1.45rem;
      }
      .call-btn {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
      .lightbox .prev,
      .lightbox .next {
        width: 44px;
        height: 44px;
        font-size: 24px;
      }
      .lightbox .close {
        width: 44px;
        height: 44px;
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>📱 ፕራይም ሞባይል</h1>
    <p>የሞባይል ስልኮች እና መለዋወጫዎች — ምርጥ ጥራት፣ ምርጥ ዋጋ</p>
    <div id="openStatus" class="open-status">...</div>
  </div>

  <div class="filter-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 ምርቶችን ፈልግ..." autocomplete="off">
    <div class="category-chips" id="categoryFilters">
      <div class="chip active" data-category="All">ሁሉም</div>
    </div>
  </div>

  <div id="productList" class="product-grid">
    <div class="loader">ምርቶች በመጫን ላይ</div>
  </div>
  <footer>© ፕራይም ሞባይል — ለማንኛውም ጥያቄ ይደውሉልን</footer>
</div>

<!-- Premium Lightbox -->
<div id="lightbox" class="lightbox">
  <span class="close">✕</span>
  <span class="prev">‹</span>
  <span class="next">›</span>
  <img id="lightboxImg" src="" alt="">
  <div class="counter" id="lightboxCounter"></div>
</div>

<script>
  let allProducts = [];
  let shopPhone = '0962577855';
  let shopName = 'Prime Mobile';
  let isOpen = true;
  let currentCategory = 'All';
  let currentSearch = '';
  let lightboxImages = [];
  let lightboxIndex = 0;

  const categoryTranslation = {
    'All': 'ሁሉም',
    'Phone': 'ስልክ',
    'Accessory': 'መለዋወጫ',
    'Tablet': 'ታብሌት'
  };

  async function fetchSettings() {
    try {
      const res = await fetch('/api/settings');
      const data = await res.json();
      shopPhone = data.phone || '0962577855';
      shopName = data.shopName || 'Prime Mobile';
      isOpen = data.isOpen !== undefined ? data.isOpen : true;
      updateOpenStatus();
    } catch (err) {
      console.warn('Could not load settings');
    }
  }

  function updateOpenStatus() {
    const statusDiv = document.getElementById('openStatus');
    if (isOpen) {
      // Updated to requested Amharic phrase
      statusDiv.innerText = 'ሱቃችን ክፍት ነው';
      statusDiv.className = 'open-status open';
    } else {
      statusDiv.innerText = 'ሱቃችን ዝግ ነው';
      statusDiv.className = 'open-status closed';
    }
  }

  async function fetchCategories() {
    try {
      const res = await fetch('/api/categories');
      const categories = await res.json();
      const container = document.getElementById('categoryFilters');
      container.innerHTML = categories.map(cat => `
        <div class="chip ${cat === 'All' ? 'active' : ''}" data-category="${cat}">${categoryTranslation[cat] || cat}</div>
      `).join('');
      document.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentCategory = chip.dataset.category;
          filterAndRender();
        });
      });
    } catch (err) {
      console.error('Failed to load categories', err);
    }
  }

  async function loadProducts() {
    const container = document.getElementById('productList');
    try {
      const res = await fetch('/api/products');
      if (!res.ok) throw new Error('Failed to fetch');
      allProducts = await res.json();
      filterAndRender();
    } catch (err) {
      container.innerHTML = '<div class="error-msg">⚠️ ምርቶችን መጫን አልተቻለም። እባክዎ ይጠብቁ ወይም ኔትዎርክ ይፈትሹ።</div>';
      console.error(err);
    }
  }

  function filterAndRender() {
    const container = document.getElementById('productList');
    let filtered = [...allProducts];
    if (currentCategory !== 'All') {
      filtered = filtered.filter(p => p.category === currentCategory);
    }
    if (currentSearch.trim()) {
      const term = currentSearch.toLowerCase();
      filtered = filtered.filter(p => 
        p.name.toLowerCase().includes(term) || 
        p.description.toLowerCase().includes(term)
      );
    }
    if (filtered.length === 0) {
      container.innerHTML = '<div class="no-results">✨ ምርቶች አልተገኙም። ሌላ ነገር ይሞክሩ ወይም ያግኙን!</div>';
      return;
    }
    container.innerHTML = filtered.map(product => {
      const images = product.images && product.images.length ? product.images : (product.imageUrl ? [product.imageUrl] : []);
      const firstImage = images[0] || 'https://placehold.co/600x600?text=Prime+Mobile';
      const categoryDisplay = categoryTranslation[product.category] || product.category;
      return `
        <div class="card">
          <img class="card-img" src="${escapeHtml(firstImage)}" alt="${escapeHtml(product.name)}" data-images='${JSON.stringify(images)}' data-name="${escapeHtml(product.name)}" loading="lazy">
          <div class="card-content">
            <span class="category-badge">${escapeHtml(categoryDisplay)}</span>
            <div class="product-name">${escapeHtml(product.name)}</div>
            <div class="product-price">${product.price.toLocaleString()} ብር</div>
            <div class="product-desc">${escapeHtml(product.description)}</div>
            <a href="tel:${shopPhone}" class="call-btn">
              📞 ይደውሉልን
            </a>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.card-img').forEach(img => {
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        const images = JSON.parse(img.dataset.images);
        const name = img.dataset.name;
        if (images && images.length) {
          openLightbox(images, 0, name);
        } else {
          openLightbox([img.src], 0, name);
        }
      });
    });
  }

  function openLightbox(images, index, productName) {
    if (!images.length) return;
    lightboxImages = images;
    lightboxIndex = index;
    const lightbox = document.getElementById('lightbox');
    const imgEl = document.getElementById('lightboxImg');
    const counter = document.getElementById('lightboxCounter');
    imgEl.src = images[index];
    counter.innerText = `${index+1} / ${images.length}  •  ${productName}`;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function nextImage() {
    if (lightboxIndex + 1 < lightboxImages.length) {
      lightboxIndex++;
      document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
      document.getElementById('lightboxCounter').innerText = `${lightboxIndex+1} / ${lightboxImages.length}`;
    }
  }

  function prevImage() {
    if (lightboxIndex - 1 >= 0) {
      lightboxIndex--;
      document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
      document.getElementById('lightboxCounter').innerText = `${lightboxIndex+1} / ${lightboxImages.length}`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Event listeners
  document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    filterAndRender();
  });

  // Lightbox controls
  const lightboxEl = document.getElementById('lightbox');
  lightboxEl.addEventListener('click', (e) => {
    if (e.target === lightboxEl || e.target.classList.contains('close')) closeLightbox();
  });
  document.querySelector('.prev').addEventListener('click', (e) => {
    e.stopPropagation();
    prevImage();
  });
  document.querySelector('.next').addEventListener('click', (e) => {
    e.stopPropagation();
    nextImage();
  });

  // Swipe support for lightbox
  let touchStartX = 0;
  lightboxEl.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].clientX;
  });
  lightboxEl.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) prevImage();
      else nextImage();
    }
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (!lightboxEl.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'Escape') closeLightbox();
  });

  // Initialize
  window.addEventListener('DOMContentLoaded', async () => {
    await fetchSettings();
    await fetchCategories();
    await loadProducts();
  });
</script>
</body>
</html>
