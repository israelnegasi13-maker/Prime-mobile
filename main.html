<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ፕራይም ሞባይል | ምርጥ ስልኮች እና መለዋወጫዎች</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f4f7fc;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 14px;
      padding-bottom: 48px;
      min-height: 100vh;
    }

    html {
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #0a2540 0%, #1c4e6f 100%);
      border-radius: 28px;
      padding: 20px 18px;
      margin-bottom: 18px;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.2);
    }

    .hero::after {
      content: "📱⚡";
      position: absolute;
      bottom: -8px;
      right: 8px;
      font-size: 70px;
      opacity: 0.08;
      pointer-events: none;
    }

    .hero h1 {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .hero p {
      font-size: 0.85rem;
      opacity: 0.9;
      line-height: 1.35;
      max-width: 75%;
    }

    .open-status {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      padding: 5px 12px;
      border-radius: 60px;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .open-status.open {
      background: #0F9D58;
      box-shadow: 0 2px 10px rgba(15,157,88,0.3);
    }

    .open-status.closed {
      background: #DC3545;
    }

    .promo-banner {
      background: linear-gradient(105deg, #f9b43a 0%, #fb8c00 100%);
      border-radius: 60px;
      padding: 10px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 6px 14px rgba(251, 140, 0, 0.2);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }

    .promo-text {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-weight: 700;
      font-size: 0.85rem;
      color: #2c1a0c;
      letter-spacing: -0.2px;
    }

    .promo-text span:first-child {
      font-size: 1.3rem;
    }

    .promo-text strong {
      background: rgba(0,0,0,0.12);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
    }

    .close-banner {
      background: rgba(0,0,0,0.2);
      border: none;
      color: #2c1a0c;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }

    .close-banner:active {
      transform: scale(0.92);
      background: rgba(0,0,0,0.35);
    }

    .filter-bar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 44px;
      padding: 12px 18px;
      margin-bottom: 24px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .search-input {
      width: 100%;
      padding: 12px 18px;
      border: 1px solid #e2edf2;
      border-radius: 60px;
      font-size: 0.9rem;
      background: #ffffff;
      transition: all 0.2s;
      font-family: inherit;
    }

    .search-input:focus {
      outline: none;
      border-color: #1c6e9e;
      box-shadow: 0 0 0 3px rgba(28,110,158,0.2);
    }

    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      background: #ffffff;
      padding: 6px 16px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      color: #1f3b4c;
      border: 1px solid #dee7ef;
      touch-action: manipulation;
    }

    .chip.active {
      background: linear-gradient(105deg, #1c5a7a, #2c7cb0);
      color: white;
      border-color: transparent;
      box-shadow: 0 5px 12px -5px rgba(28,90,122,0.4);
    }

    .chip:active {
      transform: scale(0.96);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 640px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
    }

    @media (min-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.4, 1);
      box-shadow: 0 5px 12px -6px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      height: 100%;
      border: 1px solid rgba(0,0,0,0.02);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 24px -12px rgba(0, 0, 0, 0.12);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f0f4fa;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card-content {
      padding: 12px 12px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      background: #ecf5fb;
      padding: 3px 10px;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 700;
      color: #1c5a7a;
      letter-spacing: 0.2px;
      width: fit-content;
      margin-bottom: 8px;
    }

    .product-name {
      font-size: 0.95rem;
      font-weight: 800;
      color: #0c2f42;
      line-height: 1.3;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }

    .product-price {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(115deg, #1a5d7a, #2c7cb0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 4px 0 6px;
      letter-spacing: -0.3px;
    }

    .product-desc {
      color: #5f6c7a;
      font-size: 0.7rem;
      line-height: 1.35;
      margin: 4px 0 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .call-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(105deg, #0F9D58, #0B7E46);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 0.75rem;
      text-decoration: none;
      margin-top: 6px;
      transition: all 0.2s;
      letter-spacing: 0.2px;
      box-shadow: 0 3px 8px rgba(15,157,88,0.25);
      touch-action: manipulation;
    }

    .call-btn:active {
      transform: scale(0.96);
    }

    .call-btn.disabled-btn, .call-btn[disabled] {
      background: #94a3b8;
      box-shadow: none;
      pointer-events: none;
      opacity: 0.7;
    }

    .out-of-stock-badge {
      background: #dc2626;
      color: white;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 40px;
      display: inline-block;
      margin-left: 4px;
    }

    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 36px;
      color: #1c5a7a;
      font-weight: 600;
      gap: 12px;
      background: rgba(255,255,255,0.7);
      border-radius: 48px;
      grid-column: 1 / -1;
    }

    .loader::after {
      content: "";
      width: 22px;
      height: 22px;
      border: 3px solid #e2e8f0;
      border-top-color: #2c7cb0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg, .no-results {
      background: rgba(255,255,240,0.95);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 20px 16px;
      text-align: center;
      font-weight: 500;
      font-size: 0.85rem;
      grid-column: 1 / -1;
    }

    .error-msg {
      color: #B91C1C;
      border-left: 3px solid #DC3545;
    }

    .no-results {
      color: #B45309;
      background: #FFF8E7;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #6c7f8f;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 16px 8px;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(24px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      touch-action: pan-y pinch-zoom;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 92%;
      max-height: 72%;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    }

    .lightbox .close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 34px;
      font-weight: 300;
      color: white;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      backdrop-filter: blur(6px);
    }

    .lightbox .prev,
    .lightbox .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(20, 20, 30, 0.65);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 26px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 60px;
    }

    .lightbox .prev:active,
    .lightbox .next:active {
      background: rgba(255,255,255,0.3);
      transform: translateY(-50%) scale(0.95);
    }

    .lightbox .prev {
      left: 12px;
    }

    .lightbox .next {
      right: 12px;
    }

    .lightbox .counter {
      position: absolute;
      bottom: 24px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      padding: 5px 16px;
      border-radius: 60px;
      color: white;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .toast-notification {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #fff;
      border-radius: 60px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2), 0 8px 10px -6px rgba(0,0,0,0.1);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1500;
      animation: slideUp 0.3s ease-out;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(255,255,255,0.8);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast-content {
      flex: 1;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .toast-content strong {
      font-weight: 800;
      color: #1c5a7a;
    }

    .toast-call {
      background: #0F9D58;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.7rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .toast-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #666;
      padding: 0 4px;
    }

    @media (max-width: 520px) {
      body {
        padding: 10px;
      }
      .hero {
        padding: 16px 14px;
        border-radius: 24px;
      }
      .hero h1 {
        font-size: 1.45rem;
      }
      .hero p {
        font-size: 0.75rem;
        max-width: 70%;
      }
      .open-status {
        top: 12px;
        right: 12px;
        font-size: 0.65rem;
        padding: 4px 10px;
      }
      .promo-banner {
        padding: 8px 14px;
      }
      .promo-text {
        font-size: 0.75rem;
        gap: 6px;
      }
      .product-grid {
        gap: 12px;
      }
      .card-content {
        padding: 10px 10px 12px;
      }
      .product-name {
        font-size: 0.85rem;
      }
      .product-price {
        font-size: 1.05rem;
      }
      .call-btn {
        padding: 7px 10px;
        font-size: 0.7rem;
      }
      .toast-notification {
        left: 12px;
        right: 12px;
        bottom: 12px;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>📱 ፕራይም ሞባይል</h1>
    <p>የሞባይል ስልኮች እና መለዋወጫዎች — ምርጥ ጥራት፣ ምርጥ ዋጋ</p>
    <div id="openStatus" class="open-status">...</div>
  </div>

  <div id="promoBanner" class="promo-banner" style="display: none;">
    <div class="promo-text">
      <span>🎉</span>
      <span id="promoText">ልዩ ቅናሽ!</span>
      <strong id="promoSubtext">ለጊዜው ብቻ</strong>
    </div>
    <button class="close-banner" id="closePromoBtn" aria-label="Close">✕</button>
  </div>

  <div class="filter-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 ምርቶችን ፈልግ (ስም፣ መግለጫ)" autocomplete="off">
    <div class="category-chips" id="categoryFilters">
      <div class="chip active" data-category="All">ሁሉም</div>
    </div>
  </div>

  <div id="productList" class="product-grid">
    <div class="loader">ምርቶች በመጫን ላይ</div>
  </div>
  <footer>© ፕራይም ሞባይል — ለማንኛውም ጥያቄ ይደውሉልን</footer>
</div>

<div id="lightbox" class="lightbox">
  <span class="close">✕</span>
  <span class="prev">‹</span>
  <span class="next">›</span>
  <img id="lightboxImg" src="" alt="">
  <div class="counter" id="lightboxCounter"></div>
</div>

<script>
  let allProducts = [];
  let shopPhone = '0962577855';
  let shopName = 'Prime Mobile';
  let isOpen = true;
  let currentCategory = 'All';
  let currentSearch = '';
  let lightboxImages = [];
  let lightboxIndex = 0;
  let promoSettings = { enabled: true, text: '', subtext: '' };
  let toastTimeout = null;

  const categoryTranslation = {
    'All': 'ሁሉም',
    'Phone': 'ስልክ',
    'Accessory': 'መለዋወጫ',
    'Tablet': 'ታብሌት'
  };

  const promoBanner = document.getElementById('promoBanner');
  const closePromo = document.getElementById('closePromoBtn');
  if (closePromo) {
    closePromo.addEventListener('click', () => {
      if (promoBanner) {
        promoBanner.style.display = 'none';
        sessionStorage.setItem('primePromoClosed', 'true');
      }
    });
  }

  async function fetchSettings() {
    try {
      const res = await fetch('/api/settings');
      const data = await res.json();
      shopPhone = data.phone || '0962577855';
      shopName = data.shopName || 'Prime Mobile';
      isOpen = data.isOpen !== undefined ? data.isOpen : true;
      promoSettings.enabled = data.promoEnabled !== undefined ? data.promoEnabled : true;
      promoSettings.text = data.promoText || 'ልዩ ቅናሽ! ከ 3000 ብር በላይ ግዢ ➕ ነጻ ማጓጓዝ';
      promoSettings.subtext = data.promoSubtext || 'ለጊዜው ብቻ';
      updateOpenStatus();
      updatePromoBanner();
    } catch (err) {
      console.warn('Could not load settings');
    }
  }

  function updateOpenStatus() {
    const statusDiv = document.getElementById('openStatus');
    if (isOpen) {
      statusDiv.innerText = 'ሱቃችን ክፍት ነው';
      statusDiv.className = 'open-status open';
    } else {
      statusDiv.innerText = 'ሱቃችን ዝግ ነው';
      statusDiv.className = 'open-status closed';
    }
  }

  function updatePromoBanner() {
    if (!promoBanner) return;
    const textSpan = document.getElementById('promoText');
    const subtextSpan = document.getElementById('promoSubtext');
    if (textSpan) textSpan.innerText = promoSettings.text;
    if (subtextSpan) subtextSpan.innerText = promoSettings.subtext;
    if (promoSettings.enabled && sessionStorage.getItem('primePromoClosed') !== 'true') {
      promoBanner.style.display = 'flex';
    } else {
      promoBanner.style.display = 'none';
    }
  }

  async function fetchCategories() {
    try {
      const res = await fetch('/api/categories');
      const categories = await res.json();
      const container = document.getElementById('categoryFilters');
      container.innerHTML = categories.map(cat => `
        <div class="chip ${cat === 'All' ? 'active' : ''}" data-category="${cat}">${categoryTranslation[cat] || cat}</div>
      `).join('');
      document.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentCategory = chip.dataset.category;
          filterAndRender();
        });
      });
    } catch (err) {
      console.error('Failed to load categories', err);
    }
  }

  async function loadProducts() {
    const container = document.getElementById('productList');
    try {
      const res = await fetch('/api/products');
      if (!res.ok) throw new Error('Failed to fetch');
      allProducts = await res.json();
      filterAndRender();
      startRandomNotifications();
    } catch (err) {
      container.innerHTML = '<div class="error-msg">⚠️ ምርቶችን መጫን አልተቻለም። ኔትዎርክ ይፈትሹ።</div>';
      console.error(err);
    }
  }

  function filterAndRender() {
    const container = document.getElementById('productList');
    let filtered = [...allProducts];
    if (currentCategory !== 'All') {
      filtered = filtered.filter(p => p.category === currentCategory);
    }
    if (currentSearch.trim()) {
      const term = currentSearch.toLowerCase();
      filtered = filtered.filter(p => 
        p.name.toLowerCase().includes(term) || 
        p.description.toLowerCase().includes(term)
      );
    }
    // Sorting: pinned first, then newest first (already sorted from server, but we ensure)
    filtered.sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });

    if (filtered.length === 0) {
      container.innerHTML = '<div class="no-results">✨ ምንም ምርት አልተገኘም። ሌላ ነገር ይሞክሩ ወይም ያግኙን!</div>';
      return;
    }

    container.innerHTML = filtered.map(product => {
      const images = product.images && product.images.length ? product.images : (product.imageUrl ? [product.imageUrl] : []);
      const firstImage = images[0] || 'https://placehold.co/400x400?text=Prime+Mobile';
      const categoryDisplay = categoryTranslation[product.category] || product.category;
      const pinnedIcon = product.pinned ? '📌 ' : '';
      const outOfStockBadge = product.outOfStock ? '<span class="out-of-stock-badge">⚠️ ለጊዜው አለቀ</span>' : '';
      const callButtonText = product.outOfStock ? '⛔ ለጊዜው አለቀ' : '📞 ይደውሉልን';
      const callButtonDisabled = product.outOfStock ? 'disabled class="call-btn disabled-btn"' : 'class="call-btn"';
      
      return `
        <div class="card">
          <img class="card-img" src="${escapeHtml(firstImage)}" alt="${escapeHtml(product.name)}" data-images='${JSON.stringify(images)}' data-name="${escapeHtml(product.name)}" loading="lazy">
          <div class="card-content">
            <span class="category-badge">${escapeHtml(categoryDisplay)}</span>
            <div class="product-name">${pinnedIcon}${escapeHtml(product.name)} ${outOfStockBadge}</div>
            <div class="product-price">${product.price.toLocaleString()} ብር</div>
            <div class="product-desc">${escapeHtml(product.description)}</div>
            <a href="tel:${shopPhone}" ${callButtonDisabled}>${callButtonText}</a>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.card-img').forEach(img => {
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        let images = [];
        try {
          images = JSON.parse(img.dataset.images);
        } catch(e) { images = [img.src]; }
        if (!images || !images.length) images = [img.src];
        const name = img.dataset.name || 'ምርት';
        openLightbox(images, 0, name);
      });
    });
  }

  function openLightbox(images, index, productName) {
    if (!images.length) return;
    lightboxImages = images;
    lightboxIndex = index;
    const lightbox = document.getElementById('lightbox');
    const imgEl = document.getElementById('lightboxImg');
    const counter = document.getElementById('lightboxCounter');
    imgEl.src = images[index];
    counter.innerText = `${index+1} / ${images.length}  •  ${productName}`;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
    history.pushState({ lightboxOpen: true }, '');
  }

  function closeLightbox() {
    const lightbox = document.getElementById('lightbox');
    if (!lightbox.classList.contains('active')) return;
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
    if (history.state && history.state.lightboxOpen) {
      history.back();
    }
  }

  function nextImage() {
    if (lightboxIndex + 1 < lightboxImages.length) {
      lightboxIndex++;
      document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
      document.getElementById('lightboxCounter').innerText = `${lightboxIndex+1} / ${lightboxImages.length}`;
    }
  }

  function prevImage() {
    if (lightboxIndex - 1 >= 0) {
      lightboxIndex--;
      document.getElementById('lightboxImg').src = lightboxImages[lightboxIndex];
      document.getElementById('lightboxCounter').innerText = `${lightboxIndex+1} / ${lightboxImages.length}`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function showRandomProductNotification() {
    if (!allProducts.length) return;
    let filtered = [...allProducts];
    if (currentCategory !== 'All') {
      filtered = filtered.filter(p => p.category === currentCategory);
    }
    if (currentSearch.trim()) {
      const term = currentSearch.toLowerCase();
      filtered = filtered.filter(p => 
        p.name.toLowerCase().includes(term) || 
        p.description.toLowerCase().includes(term)
      );
    }
    if (filtered.length === 0) return;
    const randomIndex = Math.floor(Math.random() * filtered.length);
    const product = filtered[randomIndex];
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `
      <div class="toast-content">
        🎁 <strong>${escapeHtml(product.name)}</strong> — በ${product.price.toLocaleString()} ብር ብቻ!<br>
        <small>ለመግዛት ይደውሉልን</small>
      </div>
      <a href="tel:${shopPhone}" class="toast-call">📞 ይደውሉ</a>
      <button class="toast-close" aria-label="Close">✕</button>
    `;
    const closeBtn = toast.querySelector('.toast-close');
    closeBtn.addEventListener('click', () => {
      toast.remove();
      if (toastTimeout) clearTimeout(toastTimeout);
    });
    document.body.appendChild(toast);
    toastTimeout = setTimeout(() => {
      if (toast && toast.parentNode) toast.remove();
    }, 6000);
  }

  function startRandomNotifications() {
    function scheduleNotification() {
      const delay = Math.floor(Math.random() * (90000 - 30000 + 1) + 30000);
      setTimeout(() => {
        showRandomProductNotification();
        scheduleNotification();
      }, delay);
    }
    scheduleNotification();
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    filterAndRender();
  });

  const lightboxEl = document.getElementById('lightbox');
  lightboxEl.addEventListener('click', (e) => {
    if (e.target === lightboxEl || e.target.classList.contains('close')) closeLightbox();
  });
  document.querySelector('.prev').addEventListener('click', (e) => {
    e.stopPropagation();
    prevImage();
  });
  document.querySelector('.next').addEventListener('click', (e) => {
    e.stopPropagation();
    nextImage();
  });

  window.addEventListener('popstate', (event) => {
    if (lightboxEl.classList.contains('active')) {
      closeLightbox();
      if (!event.state || !event.state.lightboxOpen) {
        history.pushState(null, '');
      }
    }
  });

  let touchStartX = 0;
  lightboxEl.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].clientX;
  });
  lightboxEl.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) prevImage();
      else nextImage();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (!lightboxEl.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'Escape') closeLightbox();
  });

  window.addEventListener('DOMContentLoaded', async () => {
    await fetchSettings();
    await fetchCategories();
    await loadProducts();
  });
</script>
</body>
</html>
